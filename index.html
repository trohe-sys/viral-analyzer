<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вирал-Анализатор</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e8e6e0; font-family: Georgia, serif; }
input, textarea, button { font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a0f; }
::-webkit-scrollbar-thumb { background: #2a2040; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const NICHES = ["Шпионаж/История", "Шпионаж/Польша", "Психология", "Мифология", "Наука/Треш"];
const AI_MODEL_OPENROUTER = "x-ai/grok-4.1-fast";
const AI_MODEL_PROXY = "claude-sonnet-4-6";
const AI_PRICE_INP = 0.27;
const AI_PRICE_OUT = 0.41;

const SYSTEM_PROMPT = `Ты эксперт по виральному YouTube-контенту для русскоязычной аудитории. Специализация: шпионаж/история, психология, мифология, наука/треш.

Получишь список YouTube-видео конкурентов. Создай БОЛЕЕ СИЛЬНЫЙ пакет.

Ответь ТОЛЬКО валидным JSON одной строкой без переносов строк внутри значений:
{"analysis":"текст","titles":[{"text":"заголовок","mechanic":"механика","ctr":8},{"text":"заголовок","mechanic":"механика","ctr":7},{"text":"заголовок","mechanic":"механика","ctr":6},{"text":"заголовок","mechanic":"механика","ctr":8},{"text":"заголовок","mechanic":"механика","ctr":7},{"text":"заголовок","mechanic":"механика","ctr":8},{"text":"заголовок","mechanic":"механика","ctr":7},{"text":"заголовок","mechanic":"механика","ctr":6},{"text":"заголовок","mechanic":"механика","ctr":8},{"text":"заголовок","mechanic":"механика","ctr":7}],"thumbnails":[{"visual":"детальный промпт","text":"ТЕКСТ","emotion":"эмоция"},{"visual":"детальный промпт","text":"ТЕКСТ","emotion":"эмоция"},{"visual":"детальный промпт","text":"ТЕКСТ","emotion":"эмоция"}],"combos":[{"title_index":0,"thumb_index":0,"score":9,"reason":"обоснование лучшей связки"},{"title_index":1,"thumb_index":1,"score":7,"reason":"обоснование второй связки"},{"title_index":2,"thumb_index":2,"score":6,"reason":"обоснование третьей связки"}]}

МЕХАНИКИ (разные): Тайна/разоблачение, Личная угроза, Парадокс, Число+обещание, Клиффхэнгер

КРИТЕРИЙ ЛУЧШЕГО ЗАГОЛОВКА — помечай ЛУЧШИЙ тот который одновременно:
1. Начинается с имени существа/темы (по правилу ниши)
2. Содержит конкретику — дату, цифру, действие или парадокс
3. НЕ содержит абстрактных слов сразу после имени: правда, история, тайна, секрет, загадка
4. Создаёт немедленный вопрос или диссонанс — зритель не может не кликнуть
Если несколько подходят — выбирай тот где конкретика сильнее
ЗАГОЛОВКИ: конкретные факты цифры имена, расшифровывать спецназвания
ПРЕВЬЮ — промпт строго по шаблону ниши:
- Мифология: "Photorealistic cinematic oil painting style, dark mysticism impasto, [СУЩЕСТВО или СЦЕНА с существом в действии], dark atmospheric background [лес/вода/поле/церковь], [ОСВЕЩЕНИЕ: cold moonlight для славянского / torch light для демонов / blue-green для водных], human figure реагирует на существо для масштаба, large bold text on the LEFT reads exactly [ТЕКСТ] white with dark outline, no other text, LEFT half dark empty"
- Шпионаж/История: "Photorealistic cinematic shot, [АГЕНТ или АРТЕФАКТ: конкретная поза действие], dark neutral background, dramatic side lighting, cold color grade, large bold text on the LEFT reads exactly [ТЕКСТ] white with dark outline, yellow accent on key word, figure in RIGHT half, LEFT half completely empty dark"
- Психология: "Photorealistic cinematic portrait, [ЧЕЛОВЕК: эмоция состояние — конкретная поза], split lighting half shadow half light, dark neutral background, large bold text on the LEFT reads exactly [ТЕКСТ] white with dark outline, red accent on key word, face in RIGHT half, LEFT half empty dark"
- Наука/Треш: Выбирай РАЗНЫЙ тип композиции для каждого превью из этих вариантов:
  А) "Photorealistic cinematic shot, man holds [НЕБОЛЬШОЙ ОБЪЕКТ] in one hand clearly visible, direct eye contact with camera, calm knowing expression, dark neutral background, soft dramatic lighting, large bold text on the LEFT reads exactly [ТЕКСТ] in 1-2 lines white with dark outline, yellow accent on key word, figure in RIGHT half, LEFT half completely empty dark background" — ТОЛЬКО если объект можно держать в руке
  Б) "Photorealistic cinematic wide shot, [МАСШТАБНАЯ СЦЕНА: взрыв/завод/катастрофа/разрушения], dramatic lighting, smoke, debris, [ЦВЕТОВАЯ ДОМИНАНТА: оранжевый огонь / серый дым / красный], large bold text on the LEFT reads exactly [ТЕКСТ] in 1-2 lines white with dark outline, yellow accent on key word, LEFT half dark, scene in RIGHT half"
  В) "Photorealistic cinematic shot, [КОНТРАСТНЫЙ ВИЗУАЛ: безобидный объект рядом с последствиями — мешок удобрений на фоне воронки, газовый баллон на фоне руин], split composition, dark dramatic lighting, large bold text on the LEFT reads exactly [ТЕКСТ] in 1-2 lines white with dark outline, yellow accent on key word"
ТЕКСТ ПРЕВЬЮ: макс 4 слова CAPS на РУССКОМ языке, без кавычек в поле text. ЗАПРЕЩЕНО писать текст превью на английском.
ВАЖНО: [ТЕКСТ] в промпте visual = ТОЧНАЯ КОПИЯ поля text (на русском). Пример: если text="СЕЛИТРА УБИВАЕТ", то в промпте пиши "reads exactly СЕЛИТРА УБИВАЕТ". НЕ переводи на английский.
ОБЯЗАТЕЛЬНО: все 3 превью должны быть ВИЗУАЛЬНО РАЗНЫМИ — разная композиция, разный объект/сцена, разная эмоция. Если все 3 похожи — это провал.
ЗАПРЕЩЕНО: ШОК НЕВЕРОЯТНО, повтор механик

ВИЗУАЛ СУЩЕСТВА — перед генерацией превью определи архетип по имени:
- Славянский бог/дух (Чернобог, Велес, Мара) → деревянный идол, ночной лес, языческая эстетика, синий лунный свет
- Славянское существо (Русалка, Леший, Водяной, Кикимора) → природная среда обитания, туман, ночь, фольклорная эстетика
- Демон/падший ангел (Асмодей, Azazel, Пазузу) → тёмные крылья, огонь, библейская архитектура
- Греческий миф (Медуза, Минотавр, Сирены) → мрамор, античная эстетика, Средиземноморье
- Японская мифология (Кицунэ, Они) → традиционная японская архитектура, сакура, красно-чёрная палитра
- Ведьма/колдунья → лес, котёл, тёмная сила, средневековая деревня
- Библейское существо (Нефилимы, Левиафан) → библейская эстетика, пустыня, древние руины
Если в поле ВИЗУАЛ СУЩЕСТВА есть текст — использовать его вместо архетипа.

ПРАВИЛА ПО НИШАМ:
- Мифология: ПЕРВОЕ СЛОВО = имя существа (Чернобог, Кощей, Баба Яга, Русалки). ЗАПРЕЩЕНО начинать с Почему/Как/Что/То/Запад/3. Парадокс или тайна в конце.
- Шпионаж/История: ПЕРВОЕ СЛОВО = имя операции или агента. Дата или страна в заголовке обязательны.
- Психология: ПЕРВОЕ СЛОВО = ты/твой или эмоция. Личная угроза как основная механика.
- Наука/Треш: ПЕРВОЕ СЛОВО = цифра или название вещества/явления. Измеримая опасность или рекорд.`;

function App() {
  const [ytKey, setYtKey] = useState(() => localStorage.getItem("yt_key") || "");
  const [orKey, setOrKey] = useState(() => localStorage.getItem("or_key") || "");
  const [baseUrl, setBaseUrl] = useState(() => localStorage.getItem("base_url") || "");
  const [topic, setTopic] = useState("");
  const [desc, setDesc] = useState("");
  const [visual, setVisual] = useState("");
  const [niche, setNiche] = useState(NICHES[0]);
  const [mode, setMode] = useState("topic");
  const [loading, setLoading] = useState(false);
  const [translating, setTranslating] = useState(false);
  const [stage, setStage] = useState("");
  const [progress, setProgress] = useState(0);
  const [result, setResult] = useState(null);
  const [polish, setPolish] = useState(null);
  const [error, setError] = useState("");
  const [videos, setVideos] = useState([]);
  const [logs, setLogs] = useState([]);
  const [ytVis, setYtVis] = useState(false);
  const [orVis, setOrVis] = useState(false);
  const [stats, setStats] = useState({ inp: 0, out: 0, ytQ: 0, calls: 0 });
  const [totalYtQ, setTotalYtQ] = useState(() => parseInt(localStorage.getItem("yt_q_total") || "0"));
  const logsRef = useRef(null);

  useEffect(() => { if (logsRef.current) logsRef.current.scrollTop = logsRef.current.scrollHeight; }, [logs]);

  const addLog = (msg, type) => {
    const t = new Date().toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    setLogs(p => [...p, { t, msg, type: type || "info" }]);
  };

  const addYtQ = (n) => {
    setStats(p => ({ ...p, ytQ: p.ytQ + n }));
    setTotalYtQ(p => { const v = p + n; localStorage.setItem("yt_q_total", v); return v; });
  };

  const callAI = async (userMsg, maxTok) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 60000);
    const endpoint = (baseUrl || "https://openrouter.ai/api/v1") + "/chat/completions";
    const model = baseUrl ? AI_MODEL_PROXY : AI_MODEL_OPENROUTER;
    const isNgrok = endpoint.includes("ngrok");
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + orKey, ...(isNgrok ? { "ngrok-skip-browser-warning": "true" } : {}) },
      body: JSON.stringify({ model, max_tokens: maxTok || 2000, messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: userMsg }] }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    if (!res.ok) { const e = await res.text(); throw new Error("OpenRouter " + res.status + ": " + e.slice(0, 150)); }
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || "";
    if (data.usage) setStats(p => ({ ...p, inp: p.inp + (data.usage.prompt_tokens || 0), out: p.out + (data.usage.completion_tokens || 0), calls: p.calls + 1 }));
    return text;
  };

  const parseJSON = (raw) => {
    const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
    const json = s !== -1 && e !== -1 ? raw.slice(s, e + 1) : raw;
    return JSON.parse(json);
  };

  const getKeywords = async (text) => {
    addLog("→ AI: ключевые слова...");
    const isPolish = niche === "Шпионаж/Польша";
    // Извлекаем хэштеги из конца текста — они самые точные
    const tags = text.match(/#[а-яёa-zА-ЯЁA-Z\u00C0-\u017E]+/gi) || [];
    const tagWords = tags.slice(0, 8).map(h => h.slice(1)).join(" ");
    // Сэмплируем начало + середину + конец для длинных текстов
    let textForAI;
    if (tagWords.length > 10) {
      textForAI = tagWords;
    } else if (text.length > 1500) {
      const mid = Math.floor(text.length / 2);
      textForAI = text.slice(0, 500) + "\n...\n" + text.slice(mid - 250, mid + 250) + "\n...\n" + text.slice(-500);
    } else {
      textForAI = text;
    }
    try {
      const prompt = isPolish
        ? `Ты помогаешь искать КОНКУРЕНТОВ на YouTube для видео по этому скрипту.
Определи основную тему скрипта. Сгенерируй 3 КОРОТКИХ поисковых запроса (по 2-3 слова каждый) на трёх языках — для поиска похожих видео-конкурентов.
Запросы должны быть РАЗНЫМИ по углу: один — про тему в целом, второй — про конкретное событие/персону из скрипта, третий — про жанр/формат.
Верни ТОЛЬКО JSON: {"pl":["запрос1","запрос2","запрос3"],"en":["query1","query2","query3"],"ru":["запрос1","запрос2","запрос3"]}
ЗАПРЕЩЕНО: даты, числа, длинные фразы (макс 3 слова). Игнорируй концовку/анонс следующего видео.\n\n` + textForAI
        : `Ты помогаешь искать КОНКУРЕНТОВ на YouTube для видео по этому скрипту.
Определи основную тему. Сгенерируй 3 КОРОТКИХ поисковых запроса (по 2-3 слова каждый) для поиска похожих видео на YouTube.
Запросы должны быть РАЗНЫМИ по углу: один — общая тема, второй — конкретное событие/персона/вещество из скрипта, третий — жанр (документалка, разбор, топ).
Верни ТОЛЬКО JSON одной строкой: {"q":["запрос1","запрос2","запрос3"]}
ЗАПРЕЩЕНО: даты, числа, фразы длиннее 3 слов. Игнорируй концовку/анонс следующего видео. Ниша: ` + niche + `\n\n` + textForAI;
      const kw = await callAI(prompt, 120);
      const clean = kw.trim();
      try {
        const parsed = parseJSON(clean);
        if (isPolish && parsed.pl && parsed.en && parsed.ru) {
          addLog("✓ PL: " + parsed.pl.join(" | ") + "  EN: " + parsed.en.join(" | ") + "  RU: " + parsed.ru.join(" | "), "ok");
          return parsed;
        }
        if (parsed.q && Array.isArray(parsed.q)) {
          addLog("✓ Запросы: " + parsed.q.join(" | "), "ok");
          return parsed.q;
        }
      } catch(e) {}
      // Фоллбэк: если AI вернул просто текст
      const words = clean.split("\n")[0];
      if (words && words.length > 3 && !words.includes("{")) { addLog("✓ Слова: " + words, "ok"); return [words]; }
    } catch(e) {}
    if (tags.length > 0) { const kw = tags.slice(0, 3).map(h => h.slice(1)).join(" "); addLog("⚠ Фоллбэк: " + kw, "info"); return [kw]; }
    const words = text.replace(/[^а-яёa-z0-9\u00C0-\u017E ]/gi, " ").split(/\s+/).filter(w => w.length > 3).slice(0, 3).join(" ");
    addLog("⚠ Фоллбэк: " + words, "info");
    return [words];
  };

  const fetchWithTimeout = (url, opts, ms = 30000) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(timer));
  };

  const searchYT = async (q, langParams = "") => {
    addLog("→ YouTube: " + q);
    const r = await fetchWithTimeout("https://www.googleapis.com/youtube/v3/search?part=snippet&q=" + encodeURIComponent(q) + "&type=video&maxResults=20&videoDuration=long" + langParams + "&key=" + ytKey, {}, 20000);
    if (!r.ok) throw new Error("YouTube " + r.status + " — проверь ключ");
    const d = await r.json();
    if (!d.items?.length) throw new Error("YouTube не нашёл видео: " + q);
    addYtQ(100); addLog("✓ YouTube: " + d.items.length + " видео (квота -100)", "ok");
    const ids = d.items.map(i => i.id.videoId).join(",");
    const r2 = await fetchWithTimeout("https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=" + ids + "&key=" + ytKey, {}, 20000);
    const d2 = await r2.json();
    addYtQ(1); addLog("✓ Статистика (квота -1)", "ok");
    return d2.items.map(v => ({ title: v.snippet.title, views: parseInt(v.statistics.viewCount || 0), channel: v.snippet.channelTitle, thumbnail: v.snippet.thumbnails?.high?.url || v.snippet.thumbnails?.default?.url || "" })).sort((a, b) => b.views - a.views).slice(0, 15);
  };

  const analyzeThumbnails = async (vids) => {
    const top5 = vids.filter(v => v.thumbnail).slice(0, 5);
    if (!top5.length) return "";
    addLog("→ Vision: анализирую превью конкурентов...");
    try {
      const imageContents = top5.flatMap((v, i) => ([
        { type: "text", text: (i+1) + ". \"" + v.title + "\" — " + v.views.toLocaleString() + " просм." },
        { type: "image_url", image_url: { url: v.thumbnail } }
      ]));
      const vEndpoint = (baseUrl || "https://openrouter.ai/api/v1") + "/chat/completions";
      const vModel = baseUrl ? AI_MODEL_PROXY : "openai/gpt-4o-mini";
      const isNgrokV = vEndpoint.includes("ngrok");
      const r = await fetchWithTimeout(vEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + orKey, ...(isNgrokV ? { "ngrok-skip-browser-warning": "true" } : {}) },
        body: JSON.stringify({
          model: vModel,
          max_tokens: 600,
          messages: [{ role: "user", content: [
            { type: "text", text: "Ты аналитик YouTube превью. Посмотри на эти превью конкурентов и ответь на 3 вопроса:\n1. ПАТТЕРНЫ: какие визуальные приёмы повторяются у видео с наибольшим числом просмотров? (тип объекта, расположение, цвета, стиль)\n2. ТЕКСТ: какие слова и формулы текста на превью встречаются у топовых видео?\n3. ЧТО ОТЛИЧАЕТ ТОПОВЫЕ: чем превью с 1М+ просмотрами визуально отличается от превью с 5К просмотрами?\nОтвет краткий, конкретный, без лишних слов." },
            ...imageContents
          ]}]
        })
      });
      if (!r.ok) { addLog("⚠ Vision недоступен", "info"); return ""; }
      const d = await r.json();
      const vDesc = d.choices?.[0]?.message?.content || "";
      addLog("✓ Vision: превью проанализированы", "ok");
      return vDesc ? "\n\nАНАЛИЗ ПРЕВЬЮ ТОПОВЫХ КОНКУРЕНТОВ (используй эти паттерны при генерации своих превью):\n" + vDesc + "\nВАЖНО: твои превью-промпты должны адаптировать winning паттерны топовых видео, а не копировать шаблон." : "";
    } catch(e) { addLog("⚠ Vision: " + e.message, "info"); return ""; }
  };

  const analyze = async (vids) => {
    const vtxt = vids.map((v, i) => (i+1) + ". \"" + v.title + "\" — " + v.views.toLocaleString() + " просм.").join("\n");
    const visualCtx = (mode === "desc" && visual) ? "🎨 ВИЗУАЛ СУЩЕСТВА ДЛЯ ПРЕВЬЮ: " + visual + "\n\n" : "";
    const ctx = mode === "desc" ? "Описание ролика:\n" + visualCtx + desc + "\n\n" : "Тема: " + topic + "\n\n";
    const thumbAnalysis = await Promise.race([
      analyzeThumbnails(vids),
      new Promise(r => setTimeout(() => { addLog("⚠ Vision таймаут — пропускаю", "info"); r(""); }, 45000))
    ]);
    const msg = "Ниша: " + niche + "\n" + ctx + "Конкуренты:\n" + vtxt + thumbAnalysis + "\n\nСоздай виральный пакет.";
    addLog("→ AI: анализирую " + vids.length + " видео...");
    const raw = await callAI(msg, 2000);
    addLog("✓ Ответ получен", "ok");
    return parseJSON(raw);
  };

  const adaptPolish = async () => {
    if (!result) return;
    setTranslating(true);
    try {
      const titles = result.titles.map((t, i) => (i+1) + ". " + t.text).join("\n");
      const thumbs = result.thumbnails.map((t, i) => (i+1) + ". Текст: " + t.text).join("\n");
      const msg = `Jesteś ekspertem od polskiego YouTube. Zaadaptuj poniższe tytuły i teksty miniatur na polski.

ZASADY DLA TYTUŁÓW:
- NIE tłumacz dosłownie — adaptuj kulturowo
- Zachowaj mechanikę clickbaitu
- Użyj naturalnego potocznego polskiego
- Polskie kulturowe wyzwalacze emocjonalne

ZASADY DLA TEKSTÓW MINIATUR (KRYTYCZNE):
- To są teksty na obrazkach — muszą UDERZAĆ emocjonalnie po polsku
- NIE tłumacz słowo w słowo — wymyśl polski ekwiwalent emocjonalny

    setLoading(true); setProgress(5);
    const isPolish = niche === "Шпионаж/Польша";
    try {
      let searches = [];
      if (mode === "desc") {
        setStage("Ключевые слова..."); setProgress(15);
        const kw = await getKeywords(desc);
        if (isPolish && kw.pl && kw.en && kw.ru) {
          setStage("Ищу на трёх языках..."); setProgress(25);
          const plQueries = Array.isArray(kw.pl) ? kw.pl.slice(0, 2) : [kw.pl];
          const enQueries = Array.isArray(kw.en) ? kw.en.slice(0, 1) : [kw.en];
          const ruQueries = Array.isArray(kw.ru) ? kw.ru.slice(0, 2) : [kw.ru];
          searches = [
            ...plQueries.map(q => searchYT(q, "&relevanceLanguage=pl&regionCode=PL")),
            ...enQueries.map(q => searchYT(q, "&relevanceLanguage=en")),
            ...ruQueries.map(q => searchYT(q, "&relevanceLanguage=ru"))
          ];
        } else {
          const queries = (Array.isArray(kw) ? kw : [kw]).slice(0, 3);
          setStage('Ищу: ' + queries.join(" | ")); setProgress(30);
          searches = queries.map(q => searchYT(q, ""));
        }
      } else {
        if (isPolish) {
          setStage("Ищу на трёх языках..."); setProgress(20);
          searches = [
            searchYT(topic, "&relevanceLanguage=pl&regionCode=PL"),
            searchYT(topic + " spy", "&relevanceLanguage=en"),
            searchYT(topic + " шпионаж", "&relevanceLanguage=ru")
          ];
        } else {
          const q = topic + " " + niche;
          setStage("Ищу на YouTube..."); setProgress(20);
          searches = [searchYT(q, ""), searchYT(topic, "")];
        }
      }
      const settled = await Promise.allSettled(searches);
      const results = settled.filter(r => r.status === "fulfilled").map(r => r.value);
      settled.filter(r => r.status === "rejected").forEach(r => addLog("⚠ Один поиск не ответил: " + (r.reason?.message || "таймаут"), "info"));
      if (!results.length) throw new Error("Все поиски провалились — проверь YouTube ключ");
      const seen = new Set();
      const combined = results.flat().filter(v => {
        if (seen.has(v.title)) return false;
        seen.add(v.title);
        return true;
      }).sort((a, b) => b.views - a.views).slice(0, 20);
      setVideos(combined); setProgress(60); setStage("Найдено " + combined.length + ". Анализирую...");
      const res = await analyze(combined);
      setResult(res); setProgress(100); setStage(""); setProgress(0);

                  <div style={{ fontSize: "11px", letterSpacing: "2px", color: "#4a4060", fontFamily: "monospace", marginBottom: "10px" }}>TYTUŁY</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                    {polish.titles?.map((t, i) => (
                      <div key={i} style={{ background: "#0a120a", border: "1px solid #1a2a1a", padding: "14px 18px", borderRadius: "2px", display: "flex", alignItems: "center", gap: "16px" }}>
                        <span style={{ fontSize: "18px", color: "#2a3a2a", fontFamily: "monospace", minWidth: "24px" }}>{i + 1}</span>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: "15px", color: "#e0f0e0", marginBottom: "4px", lineHeight: "1.4" }}>{t.text}</div>
                          <div style={{ fontSize: "11px", color: "#4a6a4a", fontFamily: "monospace" }}>{t.mechanic}</div>
                        </div>
                        <div style={{ fontSize: "20px", fontWeight: "bold", color: ctrColor(t.ctr), fontFamily: "monospace", minWidth: "30px", textAlign: "right" }}>{t.ctr}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: "11px", letterSpacing: "2px", color: "#4a4060", fontFamily: "monospace", marginBottom: "10px" }}>MINIATURY</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: "10px" }}>
                    {polish.thumbnails?.map((th, i) => (
                      <div key={i} style={{ background: "#0a120a", border: "1px solid #1a2a1a", padding: "16px", borderRadius: "2px" }}>
                        <div style={{ background: "#060f06", border: "1px solid #1a2a1a", padding: "10px 14px", borderRadius: "2px", textAlign: "center" }}>
                          <span style={{ fontSize: "16px", fontWeight: "bold", color: "#ffffff", letterSpacing: "1px" }}>{th.text}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
